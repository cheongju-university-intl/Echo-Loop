<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Echo Loop 韩语</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #687386;
      --line: #dfe4dc;
      --blue: #2563eb;
      --green: #15803d;
      --amber: #c77700;
      --red: #be123c;
      --soft-blue: #eaf1ff;
      --soft-green: #eaf7ee;
      --soft-amber: #fff4db;
      --shadow: 0 18px 45px rgba(23, 32, 51, .08);
    }

    body.dark {
      color-scheme: dark;
      --bg: #101318;
      --panel: #191e27;
      --ink: #f6f8fb;
      --muted: #a2adbd;
      --line: #303845;
      --blue: #7aa7ff;
      --green: #57c785;
      --amber: #f7be56;
      --red: #fb7185;
      --soft-blue: #182740;
      --soft-green: #152b20;
      --soft-amber: #302515;
      --shadow: 0 18px 45px rgba(0, 0, 0, .22);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "Noto Sans KR", sans-serif;
      letter-spacing: 0;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font-weight: 700;
    }

    button:hover { border-color: var(--blue); }
    button.primary { background: var(--blue); border-color: var(--blue); color: white; }
    button.good { background: var(--green); border-color: var(--green); color: white; }
    button.warn { background: var(--soft-amber); color: var(--amber); }
    button.icon { width: 44px; padding: 0; font-size: 18px; }
    button:disabled { cursor: not-allowed; opacity: .45; }

    input[type="file"], input[type="url"], input[type="text"], textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      outline: none;
      padding: 10px 12px;
    }

    textarea { min-height: 116px; resize: vertical; line-height: 1.6; }
    label { display: grid; gap: 7px; color: var(--muted); font-size: 12px; font-weight: 800; }
    audio { width: 100%; }

    .app {
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr) 340px;
      gap: 14px;
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--blue), var(--green));
      color: #fff;
      font-weight: 900;
    }
    h1 { margin: 0; font-size: 19px; }
    .subline { margin-top: 3px; color: var(--muted); font-size: 12px; }
    .top-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .status {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .status.ready { color: var(--green); background: var(--soft-green); border-color: transparent; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel.pad { padding: 14px; }
    .stack { display: grid; gap: 14px; align-content: start; }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    .section-title h2 { margin: 0; font-size: 15px; }
    .section-title small { color: var(--muted); font-weight: 800; }

    .drop {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 85%, var(--soft-blue));
    }
    .field-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: end; }
    .mini-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .metric {
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft-blue);
    }
    .metric b { display: block; font-size: 22px; }
    .metric span { color: var(--muted); font-size: 12px; font-weight: 800; }

    .reader { display: grid; grid-template-rows: auto auto minmax(0, 1fr); min-height: 680px; }
    .stage {
      padding: 22px;
      background: linear-gradient(180deg, var(--panel), color-mix(in srgb, var(--panel) 75%, var(--soft-blue)));
      border-bottom: 1px solid var(--line);
    }
    .stage-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .sentence {
      min-height: 150px;
      display: flex;
      align-items: center;
      padding: 18px 0;
      font-size: clamp(25px, 4vw, 48px);
      line-height: 1.45;
      font-weight: 900;
      word-break: keep-all;
    }
    .sentence.blind .word-chip { color: transparent; background: var(--line); }
    .sentence .word-chip, .cue-text .word-chip {
      display: inline-block;
      margin: 2px 3px;
      padding: 1px 4px;
      border-radius: 6px;
      cursor: pointer;
    }
    .sentence .word-chip:hover, .cue-text .word-chip:hover {
      background: var(--soft-blue);
      color: var(--blue);
    }
    .next-line {
      color: var(--muted);
      border-top: 1px solid var(--line);
      padding-top: 13px;
      font-size: 15px;
      line-height: 1.6;
    }

    .transport {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }
    .main-controls { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .options { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      min-width: 0;
    }
    .toggle input { width: auto; }
    .toggle select { padding: 4px 6px; }

    .cue-list {
      min-height: 0;
      overflow: auto;
      padding: 12px;
      display: grid;
      gap: 8px;
      align-content: start;
    }
    .cue {
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      cursor: pointer;
    }
    .cue.active { background: var(--soft-blue); border-color: var(--blue); }
    .cue-head { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 6px; color: var(--muted); font-size: 12px; font-weight: 900; }
    .cue-text { line-height: 1.55; font-size: 15px; }
    .empty { color: var(--muted); padding: 24px; text-align: center; border: 1px dashed var(--line); border-radius: 8px; }

    .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .tabs button.active { background: var(--soft-blue); border-color: var(--blue); color: var(--blue); }
    .tab { display: none; }
    .tab.active { display: grid; gap: 12px; }
    .word {
      font-size: 30px;
      font-weight: 950;
      line-height: 1.2;
      min-height: 37px;
    }
    .dict-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--soft-green);
      line-height: 1.65;
      color: var(--muted);
    }
    .link-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .link-grid a {
      display: block;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
      padding: 10px 8px;
      background: var(--panel);
    }
    .link-grid a:hover { border-color: var(--blue); color: var(--blue); }
    .note-list { display: grid; gap: 8px; max-height: 270px; overflow: auto; }
    .note-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      line-height: 1.5;
      cursor: pointer;
    }
    .note-item small { display: block; color: var(--muted); margin-bottom: 5px; font-weight: 800; }
    .rec-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      margin-right: 7px;
    }

    @media (max-width: 1120px) {
      .app { grid-template-columns: 300px minmax(0, 1fr); }
      .right { grid-column: 1 / -1; grid-template-columns: repeat(3, minmax(0, 1fr)); display: grid; }
    }
    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; padding: 10px; }
      header { align-items: flex-start; flex-direction: column; }
      .top-actions { justify-content: flex-start; }
      .reader { min-height: 620px; }
      .sentence { min-height: 120px; }
      .options { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .right { display: grid; grid-template-columns: 1fr; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <div class="mark">E</div>
        <div>
          <h1>Echo Loop 韩语</h1>
          <div class="subline">盲听 · 精听 · 跟读 · 复述 · 收藏复习</div>
        </div>
      </div>
      <div class="top-actions">
        <div id="status" class="status">等待材料</div>
        <button id="themeBtn" class="icon" title="切换主题">◐</button>
      </div>
    </header>

    <aside class="stack">
      <section class="panel pad">
        <div class="section-title"><h2>材料</h2><small>Import</small></div>
        <div class="drop">
          <label>音频文件
            <input id="audioFile" type="file" accept="audio/*,video/*">
          </label>
          <audio id="audio" controls></audio>
        </div>
        <div class="drop" style="margin-top:10px">
          <label>字幕文件
            <input id="subtitleFile" type="file" accept=".srt,.vtt,.txt,text/plain">
          </label>
        </div>
        <div class="drop" style="margin-top:10px">
          <div class="field-row">
            <label>音频 URL
              <input id="audioUrl" type="url" placeholder="https://example.com/audio.mp3">
            </label>
            <button id="loadAudioUrl">载入</button>
          </div>
          <div class="field-row">
            <label>字幕 URL
              <input id="subtitleUrl" type="url" placeholder="https://example.com/subtitle.srt">
            </label>
            <button id="loadSubtitleUrl">载入</button>
          </div>
        </div>
      </section>

      <section class="panel pad">
        <div class="section-title"><h2>统计</h2><small>Today</small></div>
        <div class="mini-grid">
          <div class="metric"><b id="cueCount">0</b><span>句子</span></div>
          <div class="metric"><b id="currentIndex">-</b><span>当前位置</span></div>
          <div class="metric"><b id="favoriteCount">0</b><span>收藏</span></div>
          <div class="metric"><b id="practiceCount">0</b><span>跟读</span></div>
        </div>
      </section>

      <section class="panel pad">
        <div class="section-title"><h2>手动文本</h2><small>Split</small></div>
        <textarea id="manualText" placeholder="오늘은 날씨가 좋아요. 같이 한국어를 연습해요."></textarea>
        <button id="splitTextBtn" class="primary" style="width:100%;margin-top:10px">切成句子</button>
      </section>
    </aside>

    <section class="panel reader">
      <div class="stage">
        <div class="stage-meta">
          <span id="stageName">Current Sentence</span>
          <span id="timeLabel">00:00 - 00:00</span>
        </div>
        <div id="sentence" class="sentence">导入韩语音频和字幕后开始练习</div>
        <div class="next-line" id="nextLine">当前网页会把材料保存在浏览器本地。</div>
      </div>

      <div class="transport">
        <div class="main-controls">
          <button id="prevBtn" class="icon" title="上一句">‹</button>
          <button id="playBtn" class="icon primary" title="播放/暂停">▶</button>
          <button id="nextBtn" class="icon" title="下一句">›</button>
          <button id="repeatBtn" class="icon" title="循环当前句">∞</button>
          <button id="favoriteBtn" class="icon" title="收藏当前句">☆</button>
          <button id="speakBtn" class="icon" title="朗读当前句">♪</button>
          <button id="copyBtn" class="icon" title="复制当前句">⧉</button>
        </div>
        <div class="options">
          <label class="toggle"><input id="blindToggle" type="checkbox">盲听</label>
          <label class="toggle"><input id="autoNextToggle" type="checkbox" checked>自动下一句</label>
          <label class="toggle">速度
            <select id="speedSelect">
              <option value="0.75">0.75x</option>
              <option value="1" selected>1x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
            </select>
          </label>
          <label class="toggle">循环
            <select id="loopCountSelect">
              <option value="1">1 次</option>
              <option value="3" selected>3 次</option>
              <option value="5">5 次</option>
              <option value="999">持续</option>
            </select>
          </label>
        </div>
      </div>

      <div id="cueList" class="cue-list">
        <div class="empty">暂无字幕</div>
      </div>
    </section>

    <aside class="stack right">
      <section class="panel pad">
        <div class="tabs">
          <button class="tabBtn active" data-tab="dict">查词</button>
          <button class="tabBtn" data-tab="record">跟读</button>
          <button class="tabBtn" data-tab="notes">复习</button>
        </div>

        <div id="dictTab" class="tab active">
          <div class="word" id="selectedWord">단어</div>
          <div class="dict-card" id="dictInfo">点击句子里的韩语词，打开词典或复制 AI 解释提示。</div>
          <div class="link-grid" id="dictLinks"></div>
          <button id="copyPromptBtn">复制 AI 查词提示</button>
        </div>

        <div id="recordTab" class="tab">
          <button id="recordBtn" class="good"><span id="recordState"></span>开始录音</button>
          <audio id="recordAudio" controls></audio>
          <textarea id="retellNote" placeholder="复述笔记 / 中文理解 / 难点"></textarea>
          <button id="saveNoteBtn" class="primary">保存笔记</button>
        </div>

        <div id="notesTab" class="tab">
          <div class="main-controls" style="justify-content:flex-start">
            <button id="exportBtn">导出</button>
            <button id="clearStoreBtn" class="warn">清空</button>
          </div>
          <div id="noteList" class="note-list"></div>
        </div>
      </section>
    </aside>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const audio = $('audio');
    const state = {
      cues: [],
      active: -1,
      looping: false,
      loopLeft: 0,
      favorites: new Set(JSON.parse(localStorage.getItem('echoLoopWebFavorites') || '[]')),
      notes: JSON.parse(localStorage.getItem('echoLoopWebNotes') || '[]'),
      practiceCount: Number(localStorage.getItem('echoLoopWebPracticeCount') || 0),
      selectedWord: '',
      recorder: null,
      chunks: [],
    };

    const demoCues = [
      { start: 0, end: 3.2, text: '오늘은 한국어 듣기 연습을 해요.' },
      { start: 3.2, end: 6.6, text: '문장을 듣고 따라 말해 보세요.' },
      { start: 6.6, end: 10.4, text: '모르는 단어는 바로 눌러서 찾아볼 수 있어요.' },
    ];

    function save() {
      localStorage.setItem('echoLoopWebFavorites', JSON.stringify([...state.favorites]));
      localStorage.setItem('echoLoopWebNotes', JSON.stringify(state.notes));
      localStorage.setItem('echoLoopWebPracticeCount', String(state.practiceCount));
    }

    function setStatus(text, ready = false) {
      $('status').textContent = text;
      $('status').classList.toggle('ready', ready);
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c]));
    }

    function cleanWord(text) {
      return String(text || '').trim().replace(/^[^A-Za-z0-9가-힣ㄱ-ㅎㅏ-ㅣ]+|[^A-Za-z0-9가-힣ㄱ-ㅎㅏ-ㅣ]+$/g, '');
    }

    function clickable(text) {
      return escapeHtml(text).split(/(\s+)/).map((part) => {
        const word = cleanWord(part);
        return word ? `<span class="word-chip" data-word="${escapeHtml(word)}">${part}</span>` : part;
      }).join('');
    }

    function fmt(seconds) {
      if (!Number.isFinite(seconds)) return '00:00';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      return (h ? `${String(h).padStart(2, '0')}:` : '') + `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function parseTime(raw) {
      const parts = raw.split(/\s+/)[0].replace(',', '.').split(':').map(Number);
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      return Number(parts[0]);
    }

    function parseSubtitle(text) {
      const blocks = text.replace(/\r/g, '').replace(/^WEBVTT[^\n]*\n/i, '').trim().split(/\n\s*\n/g);
      return blocks.map((block) => {
        const lines = block.split('\n').map((line) => line.trim()).filter(Boolean);
        const timeIndex = lines.findIndex((line) => line.includes('-->'));
        if (timeIndex < 0) return null;
        const [startRaw, endRaw] = lines[timeIndex].split('-->').map((part) => part.trim());
        const start = parseTime(startRaw);
        const end = parseTime(endRaw);
        const textLine = lines.slice(timeIndex + 1).join(' ').replace(/<[^>]+>/g, '').trim();
        return Number.isFinite(start) && Number.isFinite(end) && textLine ? { start, end, text: textLine } : null;
      }).filter(Boolean).sort((a, b) => a.start - b.start);
    }

    function render() {
      $('cueCount').textContent = state.cues.length;
      $('favoriteCount').textContent = state.favorites.size;
      $('practiceCount').textContent = state.practiceCount;
      $('currentIndex').textContent = state.active >= 0 ? state.active + 1 : '-';
      $('favoriteBtn').textContent = currentCue() && state.favorites.has(currentCue().text) ? '★' : '☆';
      $('repeatBtn').classList.toggle('primary', state.looping);
      $('sentence').classList.toggle('blind', $('blindToggle').checked);

      const cue = currentCue();
      if (cue) {
        $('sentence').innerHTML = clickable(cue.text);
        $('timeLabel').textContent = `${fmt(cue.start)} - ${fmt(cue.end)}`;
        $('nextLine').textContent = state.cues[state.active + 1]?.text || '已到最后一句';
      } else {
        $('sentence').textContent = '导入韩语音频和字幕后开始练习';
        $('timeLabel').textContent = '00:00 - 00:00';
        $('nextLine').textContent = '当前网页会把材料保存在浏览器本地。';
      }

      $('cueList').innerHTML = state.cues.length ? state.cues.map((item, index) => `
        <div class="cue ${index === state.active ? 'active' : ''}" data-index="${index}">
          <div class="cue-head"><span>${index + 1}</span><span>${fmt(item.start)} - ${fmt(item.end)}</span></div>
          <div class="cue-text">${clickable(item.text)}</div>
        </div>
      `).join('') : '<div class="empty">暂无字幕</div>';

      renderNotes();
    }

    function renderNotes() {
      const favoriteItems = [...state.favorites].map((text) => ({ type: '收藏', text }));
      const noteItems = state.notes.map((note) => ({ type: '笔记', text: note.text, note: note.note }));
      const items = [...favoriteItems, ...noteItems];
      $('noteList').innerHTML = items.length ? items.map((item, index) => `
        <div class="note-item" data-note-index="${index}">
          <small>${item.type}</small>
          <div>${escapeHtml(item.text)}</div>
          ${item.note ? `<small>${escapeHtml(item.note)}</small>` : ''}
        </div>
      `).join('') : '<div class="empty">暂无收藏</div>';
    }

    function currentCue() {
      return state.cues[state.active] || null;
    }

    function activate(index, seek = false) {
      if (!state.cues.length) return;
      state.active = Math.max(0, Math.min(index, state.cues.length - 1));
      const cue = currentCue();
      if (seek && cue) audio.currentTime = cue.start;
      render();
      document.querySelector(`.cue[data-index="${state.active}"]`)?.scrollIntoView({ block: 'nearest' });
    }

    function loadCues(cues) {
      state.cues = cues.length ? cues : demoCues;
      activate(0, false);
      setStatus(`${state.cues.length} 句已载入`, true);
    }

    function validUrl(value) {
      try {
        const url = new URL(value.trim());
        return url.protocol === 'http:' || url.protocol === 'https:' ? url.href : '';
      } catch (_) {
        return '';
      }
    }

    function showWord(word) {
      state.selectedWord = word;
      $('selectedWord').textContent = word || '단어';
      $('dictInfo').textContent = word ? `为「${word}」打开韩语词典，或复制提示到 AI 工具。` : '点击句子里的韩语词。';
      const encoded = encodeURIComponent(word);
      $('dictLinks').innerHTML = word ? `
        <a href="https://ko.dict.naver.com/#/search?query=${encoded}" target="_blank" rel="noopener">Naver</a>
        <a href="https://dic.daum.net/search.do?q=${encoded}" target="_blank" rel="noopener">Daum</a>
        <a href="https://papago.naver.com/?sk=ko&tk=zh-CN&st=${encoded}" target="_blank" rel="noopener">Papago</a>
        <a href="https://www.google.com/search?q=${encoded}+%ED%95%9C%EA%B5%AD%EC%96%B4+%EC%A4%91%EA%B5%AD%EC%96%B4" target="_blank" rel="noopener">Google</a>
      ` : '';
    }

    function aiPrompt() {
      const word = state.selectedWord || currentCue()?.text || '';
      return `请用中文解释这个韩语内容：${word}\n包括：1. 中文意思 2. 词性/语法 3. 常见搭配 4. 两个韩语例句和中文翻译。`;
    }

    $('themeBtn').onclick = () => document.body.classList.toggle('dark');

    $('audioFile').onchange = () => {
      const file = $('audioFile').files[0];
      if (!file) return;
      audio.src = URL.createObjectURL(file);
      setStatus(`音频：${file.name}`, state.cues.length > 0);
    };

    $('subtitleFile').onchange = async () => {
      const file = $('subtitleFile').files[0];
      if (!file) return;
      loadCues(parseSubtitle(await file.text()));
    };

    $('loadAudioUrl').onclick = () => {
      const url = validUrl($('audioUrl').value);
      if (!url) return setStatus('音频 URL 无效');
      audio.src = url;
      setStatus('在线音频已载入', state.cues.length > 0);
    };

    $('loadSubtitleUrl').onclick = async () => {
      const url = validUrl($('subtitleUrl').value);
      if (!url) return setStatus('字幕 URL 无效');
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(response.status);
        loadCues(parseSubtitle(await response.text()));
      } catch (_) {
        setStatus('字幕读取失败，可能是 CORS');
      }
    };

    $('splitTextBtn').onclick = () => {
      const sentences = $('manualText').value.split(/(?<=[.?!。！？])\s+|\n+/).map((line) => line.trim()).filter(Boolean);
      loadCues(sentences.map((text, index) => ({ start: index * 4, end: index * 4 + 4, text })));
    };

    $('playBtn').onclick = () => {
      if (audio.paused) audio.play().catch(() => setStatus('浏览器阻止播放'));
      else audio.pause();
    };
    $('prevBtn').onclick = () => activate(state.active - 1, true);
    $('nextBtn').onclick = () => activate(state.active + 1, true);
    $('repeatBtn').onclick = () => {
      state.looping = !state.looping;
      state.loopLeft = Number($('loopCountSelect').value);
      render();
    };
    $('favoriteBtn').onclick = () => {
      const cue = currentCue();
      if (!cue) return;
      state.favorites.has(cue.text) ? state.favorites.delete(cue.text) : state.favorites.add(cue.text);
      save();
      render();
    };
    $('speakBtn').onclick = () => {
      const cue = currentCue();
      if (!cue || !('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(cue.text);
      utterance.lang = 'ko-KR';
      utterance.rate = Number($('speedSelect').value);
      speechSynthesis.speak(utterance);
    };
    $('copyBtn').onclick = () => navigator.clipboard?.writeText(currentCue()?.text || '');
    $('copyPromptBtn').onclick = () => navigator.clipboard?.writeText(aiPrompt());
    $('blindToggle').onchange = render;
    $('speedSelect').onchange = () => { audio.playbackRate = Number($('speedSelect').value); };

    audio.ontimeupdate = () => {
      const time = audio.currentTime;
      const index = state.cues.findIndex((cue) => time >= cue.start && time < cue.end);
      if (index >= 0 && index !== state.active) activate(index, false);

      const cue = currentCue();
      if (!cue || time < cue.end) return;
      if (state.looping) {
        if (state.loopLeft !== 999) state.loopLeft -= 1;
        if (state.loopLeft > 0 || state.loopLeft === 999) {
          audio.currentTime = cue.start;
          audio.play().catch(() => {});
        } else {
          state.looping = false;
          render();
        }
      } else if (!$('autoNextToggle').checked) {
        audio.pause();
      }
    };
    audio.onplay = () => { $('playBtn').textContent = 'Ⅱ'; };
    audio.onpause = () => { $('playBtn').textContent = '▶'; };

    document.addEventListener('click', (event) => {
      const wordNode = event.target.closest('[data-word]');
      if (wordNode) showWord(wordNode.dataset.word);
      const cueNode = event.target.closest('.cue[data-index]');
      if (cueNode && !wordNode) activate(Number(cueNode.dataset.index), true);
      const noteNode = event.target.closest('.note-item');
      if (noteNode) {
        const text = noteNode.querySelector('div')?.textContent || '';
        const index = state.cues.findIndex((cue) => cue.text === text);
        if (index >= 0) activate(index, true);
      }
    });

    document.querySelectorAll('.tabBtn').forEach((button) => {
      button.onclick = () => {
        document.querySelectorAll('.tabBtn').forEach((b) => b.classList.toggle('active', b === button));
        document.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab.id === `${button.dataset.tab}Tab`));
      };
    });

    $('recordBtn').onclick = async () => {
      if (state.recorder?.state === 'recording') {
        state.recorder.stop();
        return;
      }
      if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
        setStatus('浏览器不支持录音');
        return;
      }
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      state.chunks = [];
      state.recorder = new MediaRecorder(stream);
      state.recorder.ondataavailable = (event) => state.chunks.push(event.data);
      state.recorder.onstop = () => {
        stream.getTracks().forEach((track) => track.stop());
        $('recordAudio').src = URL.createObjectURL(new Blob(state.chunks, { type: 'audio/webm' }));
        $('recordBtn').innerHTML = '开始录音';
        state.practiceCount += 1;
        save();
        render();
      };
      state.recorder.start();
      $('recordBtn').innerHTML = '<span class="rec-dot"></span>停止录音';
    };

    $('saveNoteBtn').onclick = () => {
      const cue = currentCue();
      const note = $('retellNote').value.trim();
      if (!cue && !note) return;
      state.notes.unshift({ text: cue?.text || '手动笔记', note, at: new Date().toISOString() });
      $('retellNote').value = '';
      save();
      render();
    };

    $('exportBtn').onclick = () => {
      const blob = new Blob([JSON.stringify({ favorites: [...state.favorites], notes: state.notes }, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'echo-loop-korean-notes.json';
      a.click();
    };

    $('clearStoreBtn').onclick = () => {
      if (!confirm('清空当前网页的收藏和笔记？')) return;
      state.favorites.clear();
      state.notes = [];
      state.practiceCount = 0;
      save();
      render();
    };

    loadCues(demoCues);
    setStatus('演示材料已载入', true);
    showWord('');
  </script>
</body>
</html>
